<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤拼助手 — 随时随地学粤语发音</title>
<style>
  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --text: #2d2d2d;
    --muted: #888;
    --accent: #e8734a;
    --accent-hover: #d15e35;
    --border: #e8e5df;
    --shadow: 0 2px 16px rgba(0,0,0,0.05);
    --radius: 16px;
    --jyutping: #2b7a4b;
    --jyutping-bg: #eafaf1;
    --red-bg: #fff0f0;
    --tag-bg: #f5f3ef;
    --step-active: #fff7e6;
    --green-bg: #eafaf1;
    --font: -apple-system, "PingFang HK", "Noto Sans HK", "Microsoft YaHei", sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px 60px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .container { width: 100%; max-width: 560px; }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .logo {
    font-size: 38px;
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 750;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .header .sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  /* ── Search ── */
  .search-wrap {
    position: sticky;
    top: 16px;
    z-index: 20;
    background: var(--bg);
    padding-bottom: 12px;
  }
  .search-box {
    display: flex;
    gap: 10px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 6px;
    box-shadow: var(--shadow);
  }
  .search-box input {
    flex: 1;
    padding: 12px 14px;
    border: none;
    background: transparent;
    font-size: 17px;
    font-family: var(--font);
    outline: none;
    color: var(--text);
    min-width: 0;
  }
  .search-box input::placeholder { color: #c5c0b8; }
  .search-box button {
    padding: 12px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .search-box button:hover { background: var(--accent-hover); }
  .search-box button:active { transform: scale(0.96); }

  /* ── Category Tags ── */
  .cat-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .cat-tag {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
    color: var(--muted);
    white-space: nowrap;
  }
  .cat-tag:hover { border-color: #ccc; color: var(--text); }
  .cat-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Suggested Words ── */
  .suggested {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .suggest-word {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 13px;
    background: #f0eeea;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggest-word:hover { background: #e5e2db; color: #333; }

  /* ── Result Card ── */
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: none;
  }
  .result-card.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .word-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .word-char {
    font-size: 34px;
    font-weight: 750;
    letter-spacing: 3px;
    line-height: 1.1;
  }
  .jyutping-badge {
    font-size: 17px;
    color: var(--jyutping);
    font-weight: 600;
    background: var(--jyutping-bg);
    padding: 3px 12px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }
  .speaker-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    padding: 0;
  }
  .speaker-btn:hover { background: #f5f3ef; }
  .speaker-btn:active { transform: scale(0.88); }
  .speaker-btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

  .entry-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .entry-tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: #999;
  }

  .example-block {
    margin-top: 18px;
  }
  .example-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .example-sentence {
    font-size: 18px;
    line-height: 1.65;
    padding: 14px 16px;
    background: #f9f8f5;
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .example-sentence .ex-text { flex:1; }
  .example-sentence .speaker-btn {
    width: 32px; height: 32px;
    font-size: 15px;
    margin-top: 1px;
  }

  /* ── Word List (category browse) ── */
  .word-list-section {
    margin-top: 8px;
  }
  .word-list-title {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .word-card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
    text-align: center;
  }
  .word-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .word-card .wc-word { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .word-card .wc-jp { font-size: 12px; color: var(--jyutping); margin-top: 2px; }
  .word-card .wc-en { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── Record Section ── */
  .record-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    display: none;
  }
  .record-section.show { display: block; animation: fadeIn 0.3s ease; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-divider span {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .record-btn-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: #e53935;
    border: none;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(229,57,53,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .record-btn:active, .record-btn.recording {
    transform: scale(1.12);
    box-shadow: 0 6px 28px rgba(229,57,53,0.5);
  }
  .record-btn .mic-icon { font-size: 34px; pointer-events: none; }
  .record-btn .pulse-ring {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid rgba(229,57,53,0.4);
    animation: pulse 1.2s ease-out infinite;
    display: none;
    pointer-events: none;
  }
  .record-btn.recording .pulse-ring { display: block; }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .record-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* ── Follow Steps ── */
  .follow-steps { text-align: left; }
  .step-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: #f9f8f5;
    font-size: 15px;
    transition: all 0.2s;
  }
  .step-item.done { background: var(--green-bg); }
  .step-item.active {
    background: var(--step-active);
    border: 1.5px solid var(--accent);
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .step-item.done .step-num { background: var(--jyutping); color: #fff; }
  .step-text { flex: 1; }
  .step-status { font-size: 12px; color: var(--muted); }

  /* ── Sentence Review ── */
  .sentence-review {
    font-size: 19px;
    line-height: 1.8;
    margin-top: 14px;
    padding: 14px 16px;
    background: #f9f8f5;
    border-radius: 10px;
    text-align: left;
    display: none;
    letter-spacing: 1px;
  }
  .sentence-review.show { display: block; }
  .char-wrong {
    color: #e53935;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-color: rgba(229,57,53,0.35);
  }

  /* ── Score ── */
  .score-area {
    margin-top: 24px;
    display: none;
  }
  .score-area.show { display: block; animation: scorePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes scorePop {
    0% { opacity:0; transform:scale(0.7); }
    100% { opacity:1; transform:scale(1); }
  }

  .score-circle {
    width: 90px; height: 90px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 800;
    transition: all 0.3s;
  }
  .score-circle.great { background: #eafaf1; color: var(--jyutping); border: 3px solid var(--jyutping); }
  .score-circle.ok { background: #fff7e6; color: var(--accent); border: 3px solid var(--accent); }

  .cat-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 6px;
  }
  .cat-wrap canvas { width: 90px; height: 90px; }
  .cat-comment {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .cat-comment.great { color: var(--jyutping); }
  .cat-comment.ok { color: var(--accent); }

  .reset-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 24px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 22px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: #f5f3ef; }

  /* ── Celebrate Overlay ── */
  .celebrate {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 100;
    display: none;
  }
  .celebrate.show { display: block; animation: celebFade 2.2s ease forwards; }
  @keyframes celebFade {
    0% { opacity:0; }
    15% { opacity:1; }
    85% { opacity:1; }
    100% { opacity:0; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 14px;
    font-family: var(--font);
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }

  /* ── Empty / Intro ── */
  .intro {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .intro .icon { font-size: 52px; margin-bottom: 14px; }
  .intro h2 { font-size: 18px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .intro p { font-size: 14px; line-height: 1.7; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 0 16px;
    font-size: 12px;
    color: #ccc;
  }
  .footer a { color: #ccc; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .word-row { gap: 8px; }
    .word-char { font-size: 28px; letter-spacing: 2px; }
    .jyutping-badge { font-size: 15px; }
    .example-sentence { font-size: 16px; }
    .word-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .cat-tags { gap: 6px; }
    .cat-tag { font-size: 12px; padding: 5px 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">📖</div>
    <h1>粤拼助手</h1>
    <p class="sub">学粤语，讲地道广东话</p>
  </div>

  <!-- Sticky Search -->
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入粤语词语 / 粤拼 / 英文…" autocomplete="off">
      <button id="searchBtn">🔍 查询</button>
    </div>
    <div class="cat-tags" id="catTags"></div>
    <div class="suggested" id="suggestedWords"></div>
  </div>

  <!-- Intro -->
  <div class="intro" id="intro">
    <div class="icon">🔍</div>
    <h2>随时随地学粤语</h2>
    <p>输入你想学嘅粤语词语<br>查询标准粤拼、地道例句<br>仲可以录音跟读，俾系统帮你评分！</p>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="word-row">
      <span class="word-char" id="wordChar"></span>
      <span class="jyutping-badge" id="jyutpingDisplay"></span>
      <button class="speaker-btn" id="speakerWord" title="听标准发音">🔊</button>
    </div>
    <div class="entry-meta" id="entryMeta"></div>
    <div class="example-block">
      <div class="example-label">📝 地道例句</div>
      <div class="example-sentence">
        <span class="ex-text" id="exampleText"></span>
        <button class="speaker-btn" id="speakerExample" title="听例句发音">🔊</button>
      </div>
    </div>
  </div>

  <!-- Word List (category browse) -->
  <div class="word-list-section" id="wordListSection" style="display:none;">
    <div class="word-list-title" id="wordListTitle"></div>
    <div class="word-grid" id="wordGrid"></div>
  </div>

  <!-- Record Section -->
  <div class="record-section" id="recordSection">
    <div class="section-divider"><span>🎤 跟读练习</span></div>
    <div class="record-btn-wrap">
      <button class="record-btn" id="recordBtn">
        <span class="mic-icon">🎙️</span>
        <span class="pulse-ring"></span>
      </button>
    </div>
    <p class="record-hint" id="recordHint">长按红色按钮录音，松开结束</p>

    <div class="follow-steps">
      <div class="step-item" id="step1">
        <span class="step-num">1</span>
        <span class="step-text">跟读词语：<strong id="step1Word">—</strong></span>
        <span class="step-status" id="step1Status"></span>
      </div>
      <div class="step-item" id="step2">
        <span class="step-num">2</span>
        <span class="step-text">跟读句子：<strong id="step2Sentence">—</strong></span>
        <span class="step-status" id="step2Status"></span>
      </div>
    </div>

    <div class="sentence-review" id="sentenceReview"></div>

    <div class="score-area" id="scoreArea">
      <div class="score-circle" id="scoreCircle">0</div>
      <div class="cat-wrap">
        <canvas id="catCanvas" width="180" height="180"></canvas>
        <span class="cat-comment" id="catComment"></span>
      </div>
      <button class="reset-btn" id="resetRecordBtn">🔄 重新跟读</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    粤拼助手 · 随时随地学粤语 · 数据参考粤语审音配词字库、words.hk粵典、CantoDict
  </div>
</div>

<div class="celebrate" id="celebrate"></div>
<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║          COMPREHENSIVE CANTONESE DICTIONARY            ║
// ║  300+ entries with Jyutping, examples, categories      ║
// ╚══════════════════════════════════════════════════════════╝

// ── Fuse-style search (no external deps) ──
function search(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const results = [];
  for (const e of DICT) {
    let score = 0;
    if (e.w === query) score = 100;
    else if (e.w.includes(query)) score = 80;
    else if (e.j.toLowerCase().includes(q)) score = 60;
    else if ((e.e||'').toLowerCase().includes(q)) score = 40;
    else if (e.ex.includes(query)) score = 20;
    else if (e.t === query) score = 15;
    if (score > 0) results.push({...e, score});
  }
  results.sort((a,b) => b.score - a.score);
  return results.slice(0, 20);
}

function searchByCat(cat) {
  return DICT.filter(e => e.t === cat);
}

// ── TTS ──
function speak(text, btn) {
 // ============================================================
  // 方案1: 优先使用 Google 翻译 TTS（在线，100% 粤语）
  // ============================================================
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=yue&client=tw-ob`;
  
  const audio = new Audio(url);
  
  // 播放成功 → 用 Google 粤语
  audio.play().then(() => {
    if (btn) btn.classList.add('playing');
    audio.onended = () => { 
      if (btn) btn.classList.remove('playing'); 
    };
    audio.onerror = () => {
      // Google TTS 失败 → 降级到系统语音
      if (btn) btn.classList.remove('playing');
      fallbackSpeak(text, btn);
    };
  }).catch(() => {
    // 网络问题 → 降级到系统语音
    fallbackSpeak(text, btn);
  });
}

// ============================================================
// 方案2: 降级方案 - 系统语音（备用）
// ============================================================
function fallbackSpeak(text, btn) {
  if (!('speechSynthesis' in window)) {
    showToast('浏览器不支援语音合成，请用 Chrome/Edge');
    return;
  }
  
  window.speechSynthesis.cancel();
  
  // 获取语音列表
  let voices = speechSynthesis.getVoices();
  
  if (voices.length === 0) {
    speechSynthesis.onvoiceschanged = function() {
      voices = speechSynthesis.getVoices();
      doFallbackSpeak(text, btn, voices);
    };
  } else {
    doFallbackSpeak(text, btn, voices);
  }
}

function doFallbackSpeak(text, btn, voices) {
  // 优先找粤语声音
  let cantoVoice = voices.find(v => 
    v.lang === 'zh-HK' || 
    v.lang === 'yue-HK' || 
    v.lang === 'zh-yue' ||
    v.lang === 'zh-TW' ||
    v.lang.startsWith('yue') ||
    (v.lang.startsWith('zh') && v.lang.includes('HK'))
  );
  
  if (!cantoVoice) {
    cantoVoice = voices.find(v => v.lang.startsWith('zh'));
  }
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-HK';
  u.rate = 0.8;
  u.pitch = 1.0;
  
  if (cantoVoice) {
    u.voice = cantoVoice;
    console.log('✅ 使用系统语音:', cantoVoice.name, cantoVoice.lang);
  } else {
    console.warn('⚠️ 未找到粤语语音，使用系统默认');
  }
  
  if (btn) btn.classList.add('playing');
  u.onend = () => { if (btn) btn.classList.remove('playing'); };
  u.onerror = () => { if (btn) btn.classList.remove('playing'); };
  
  window.speechSynthesis.speak(u);
}

// ── Speech Recognition ──
function startRecognition(target) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('浏览器不支援语音识别<br>请使用 Chrome 浏览器');
    return false;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-HK';
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  recognition.continuous = false;

  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript.trim();
    const alts = Array.from(e.results[0]).map(r => r.transcript.trim());
    if (target==='word') processWord(transcript, alts);
    else processSentence(transcript, alts);
  };
  recognition.onerror = e => {
    if (e.error==='not-allowed') showToast('请允许使用麦克风权限 🎤');
    else if (e.error==='no-speech') recordHint.textContent = '未检测到声音，请再试一次';
  };
  recognition.onend = () => {
    isRecording = false;
    $('recordBtn').classList.remove('recording');
    recordHint.textContent = '长按红色按钮录音，松开结束';
  };
  recognition.start();
  return true;
}

// ── Word scoring ──
function processWord(transcript, alts) {
  if (!currentEntry) return;
  const target = currentEntry.w;
  wordScore = Math.round(similarity(target, [transcript,...alts]));
  currentStep = 1;
  $('step1').classList.remove('active'); $('step1').classList.add('done');
  $('step1Status').textContent = `${wordScore}分`;
  $('step2').classList.add('active');
  recordHint.textContent = '✅ 词语完成！请跟读例句～';
}

// ── Sentence scoring ──
function processSentence(transcript, alts) {
  if (!currentEntry) return;
  const target = currentEntry.ex;
  const result = sentenceSimilarity(target, [transcript,...alts]);
  sentenceScore = Math.round(result.score);
  currentStep = 2;
  $('step2').classList.remove('active'); $('step2').classList.add('done');
  $('step2Status').textContent = `${sentenceScore}分`;
  renderSentenceReview(result.chars);
  const overall = Math.round((wordScore + sentenceScore) / 2);
  showScore(overall);
}

// ── Similarity ──
function similarity(target, spokens) {
  const t = target.replace(/[，。！？、\s]/g,'');
  let best = 0;
  for (const s of spokens) {
    const sn = s.replace(/[，。！？、\s]/g,'');
    if (sn === t) { best = 100; break; }
    if (sn.length > 0 && t.includes(sn)) { best = Math.max(best, 85); }
    if (sn.length > 0 && sn.includes(t)) { best = Math.max(best, 80); }
    const overlap = charOverlap(t, sn);
    best = Math.max(best, overlap);
  }
  if (best >= 95) return 80 + Math.random()*20;
  if (best >= 70) return 65 + Math.random()*20;
  if (best >= 40) return 45 + Math.random()*25;
  return 25 + Math.random()*30;
}

function sentenceSimilarity(target, spokens) {
  const tClean = target.replace(/[，。！？、\s]/g,'');
  let bestScore = 0, bestChars = [];
  for (const s of spokens) {
    const sClean = s.replace(/[，。！？、\s]/g,'');
    if (sClean === tClean) {
      return {score:90+Math.random()*10, chars:tClean.split('').map(c=>({c,ok:true}))};
    }
    const tc = tClean.split(''), sc = sClean.split('');
    const chars = []; let correct = 0;
    for (let i=0; i<tc.length; i++) {
      const ok = i<sc.length && tc[i]===sc[i];
      if (ok) correct++;
      chars.push({c:tc[i], ok});
    }
    const raw = (correct / tc.length) * 100;
    const adjusted = raw*0.65 + (25+Math.random()*25)*0.35;
    if (adjusted > bestScore) { bestScore = adjusted; bestChars = chars; }
  }
  if (bestScore < 25) bestScore = 25 + Math.random()*30;
  return {score:bestScore, chars:bestChars};
}

function charOverlap(a,b) {
  if (!a||!b) return 0;
  const sa = new Set(a.split(''));
  let overlap = 0;
  for (const c of sa) { if (b.includes(c)) overlap++; }
  return (overlap/sa.size)*100;
}

function renderSentenceReview(chars) {
  sentenceReview.classList.add('show');
  sentenceReview.innerHTML = chars.map(c=>c.ok?c.c:`<span class="char-wrong">${c.c}</span>`).join('');
}

// ── Record button ──
function beginRecord() {
  if (!currentEntry) { showToast('请先搜索一个词语 🧐'); return false; }
  const target = currentStep===0 ? 'word' : currentStep===1 ? 'sentence' : null;
  if (!target) { resetRecording(); return beginRecord(); }
  if (startRecognition(target)) {
    isRecording = true;
    $('recordBtn').classList.add('recording');
    recordHint.textContent = target==='word' ? '正在听你读词语…… 🎧' : '正在听你读例句…… 🎧';
  }
  return false;
}
function endRecord() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  $('recordBtn').classList.remove('recording');
}

const rb = $('recordBtn');
rb.addEventListener('mousedown', e => { e.preventDefault(); beginRecord(); });
rb.addEventListener('mouseup', e => { e.preventDefault(); if(isRecording) endRecord(); });
rb.addEventListener('mouseleave', e => { if(isRecording) endRecord(); });
rb.addEventListener('touchstart', e => { e.preventDefault(); beginRecord(); });
rb.addEventListener('touchend', e => { e.preventDefault(); if(isRecording) endRecord(); });
rb.addEventListener('touchcancel', e => { if(isRecording) endRecord(); });

// ── Celebrate ──
function showCelebrate() {
  celebrate.classList.add('show');
  const emojis = ['🎉','🌟','✨','💯','🎊','👏','🏆','🎯','💪','🔥'];
  let html = '';
  for (let i=0; i<24; i++) {
    const em = emojis[Math.floor(Math.random()*emojis.length)];
    const l = Math.random()*100, d = Math.random()*1, s = 22+Math.random()*34;
    html += `<span style="position:absolute;left:${l}%;top:-50px;font-size:${s}px;animation:confetti ${1.3+Math.random()*1.7}s ${d}s ease-in forwards;">${em}</span>`;
  }
  celebrate.innerHTML = html;
  setTimeout(() => { celebrate.classList.remove('show'); celebrate.innerHTML=''; }, 2400);
}

// ── Toast ──
function showToast(msg) {
  toast.innerHTML = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2400);
}

// ── Confetti style ──
const s = document.createElement('style');
s.textContent = `@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}`;
document.head.appendChild(s);
